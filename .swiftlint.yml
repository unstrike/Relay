# SwiftLint baseline configuration for Relay
# https://github.com/realm/SwiftLint

included:
  - Relay
  - RelayTests

excluded:
  - Relay.xcodeproj

# Rules: opt-in rules enabled on top of the default set
opt_in_rules:
  - array_init
  - closure_spacing
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_string
  - explicit_init
  - fatal_error_message
  - first_where
  - last_where
  - literal_expression_end_indentation
  - modifier_order
  - operator_usage_whitespace
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - yoda_condition

disabled_rules:
  - trailing_whitespace                      # swift-format handles this
  - trailing_comma                           # swift-format adds trailing commas; conflicts with swiftlint
  - todo                                     # TODOs are acceptable during development
  - opening_brace                            # swift-format places { on new line for multi-line conditions
  - cyclomatic_complexity                    # pre-existing complex functions; not actionable without refactor
  - multiple_closures_with_trailing_closure  # SwiftUI/Combine patterns require this style
  - large_tuple                              # pre-existing API patterns; not actionable without breaking changes
  - switch_case_alignment                    # conflicts with swift-format style
  - function_parameter_count                 # complex NSOutlineView delegate/datasource methods

# Tuning
line_length:
  warning: 180
  error: 200
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 450
  error: 700

file_length:
  warning: 1600
  error: 2000

function_body_length:
  warning: 85
  error: 120

identifier_name:
  min_length: 2
  excluded:
    - id
    - x
    - y
    - to
    - vc
    - a
    - b
    - c
    - e
    - f
    - g
    - i
    - l
    - m
    - n
    - o
    - p
    - t
    - v

nesting:
  type_level: 3

reporter: "xcode"
